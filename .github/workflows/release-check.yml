name: Release Check

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-assets:
    name: Validate release assets
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify release files exist
        run: |
          test -s PAPER.md
          test -s ANNOUNCEMENT.md
          test -s assets/banner.svg

      - name: Verify banner is SVG
        run: |
          grep -q "<svg" assets/banner.svg

      - name: Verify announcement has notes
        run: |
          test "$(wc -c < ANNOUNCEMENT.md)" -gt 500
