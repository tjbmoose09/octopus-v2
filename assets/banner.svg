<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-labelledby="title desc">
  <title id="title">Octopus Agents V2.2 — A 34-Agent Local-First Mesh</title>
  <desc id="desc">Octopus-themed release banner showing a central core with 34 tentacle endpoints fanning outward, dark layered background, and headline metrics.</desc>

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0a0d14"/>
      <stop offset="55%" stop-color="#0d1220"/>
      <stop offset="100%" stop-color="#070912"/>
    </linearGradient>

    <!-- Core glow -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#5b8cff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>

    <!-- Tentacle gradient -->
    <linearGradient id="tentacle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#7c5cff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#5b8cff" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#5b8cff"/>
    </linearGradient>

    <!-- HZ accent (deep red) -->
    <linearGradient id="hzAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>

    <filter id="softBlur">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <!-- Tentacle path: from core (380,320) curving out -->
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#7c5cff" stroke-width="0.5">
    <line x1="0"   y1="160" x2="1280" y2="160"/>
    <line x1="0"   y1="320" x2="1280" y2="320"/>
    <line x1="0"   y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0"   x2="320"  y2="640"/>
    <line x1="640" y1="0"   x2="640"  y2="640"/>
    <line x1="960" y1="0"   x2="960"  y2="640"/>
  </g>

  <!-- ======= MESH (left half) ======= -->
  <!-- Core halo -->
  <circle cx="380" cy="320" r="160" fill="url(#coreGlow)"/>
  <!-- Core ring -->
  <circle cx="380" cy="320" r="46" fill="#0e1322" stroke="#7c5cff" stroke-width="2"/>
  <text x="380" y="326" text-anchor="middle" font-family="ui-monospace,Consolas,Menlo,monospace" font-size="14" fill="#7c5cff" font-weight="700">CORE</text>

  <!-- 19 mainline tentacles, fanning right & up/down -->
  <g stroke-width="1.5" fill="none">
    <!-- Use 19 cubic curves for mainline (purple/blue) -->
    <path d="M 380 320 C 470 220, 540 180, 600 150" stroke="url(#tentacle)" opacity="0.85"/>
    <path d="M 380 320 C 480 240, 560 215, 620 195" stroke="url(#tentacle)" opacity="0.80"/>
    <path d="M 380 320 C 490 260, 580 245, 640 235" stroke="url(#tentacle)" opacity="0.75"/>
    <path d="M 380 320 C 495 280, 590 270, 650 268" stroke="url(#tentacle)" opacity="0.70"/>
    <path d="M 380 320 C 500 295, 600 290, 660 295" stroke="url(#tentacle)" opacity="0.85"/>
    <path d="M 380 320 C 500 310, 605 312, 665 320" stroke="url(#tentacle)" opacity="0.95"/>
    <path d="M 380 320 C 500 325, 605 335, 660 345" stroke="url(#tentacle)" opacity="0.85"/>
    <path d="M 380 320 C 500 340, 600 360, 650 375" stroke="url(#tentacle)" opacity="0.75"/>
    <path d="M 380 320 C 495 360, 590 380, 640 405" stroke="url(#tentacle)" opacity="0.70"/>
    <path d="M 380 320 C 490 380, 580 410, 620 445" stroke="url(#tentacle)" opacity="0.75"/>
    <path d="M 380 320 C 480 400, 560 435, 600 490" stroke="url(#tentacle)" opacity="0.80"/>
    <path d="M 380 320 C 470 420, 540 470, 580 530" stroke="url(#tentacle)" opacity="0.85"/>
    <path d="M 380 320 C 440 420, 470 470, 480 540" stroke="url(#tentacle)" opacity="0.65"/>
    <path d="M 380 320 C 380 420, 360 480, 350 545" stroke="url(#tentacle)" opacity="0.55"/>
    <path d="M 380 320 C 320 420, 290 470, 270 530" stroke="url(#tentacle)" opacity="0.50"/>
    <path d="M 380 320 C 290 380, 250 380, 200 380" stroke="url(#tentacle)" opacity="0.45"/>
    <path d="M 380 320 C 290 320, 240 320, 180 320" stroke="url(#tentacle)" opacity="0.55"/>
    <path d="M 380 320 C 290 260, 250 250, 200 250" stroke="url(#tentacle)" opacity="0.45"/>
    <path d="M 380 320 C 320 220, 290 180, 270 130" stroke="url(#tentacle)" opacity="0.55"/>
  </g>

  <!-- Mainline tentacle tips -->
  <g fill="#7c5cff" stroke="#0e1322" stroke-width="1.5">
    <circle cx="600" cy="150" r="5"/>
    <circle cx="620" cy="195" r="5"/>
    <circle cx="640" cy="235" r="5"/>
    <circle cx="650" cy="268" r="5"/>
    <circle cx="660" cy="295" r="6"/>
    <circle cx="665" cy="320" r="7"/>
    <circle cx="660" cy="345" r="6"/>
    <circle cx="650" cy="375" r="5"/>
    <circle cx="640" cy="405" r="5"/>
    <circle cx="620" cy="445" r="5"/>
    <circle cx="600" cy="490" r="5"/>
    <circle cx="580" cy="530" r="5"/>
    <circle cx="480" cy="540" r="4"/>
    <circle cx="350" cy="545" r="4"/>
    <circle cx="270" cy="530" r="4"/>
    <circle cx="200" cy="380" r="4"/>
    <circle cx="180" cy="320" r="4"/>
    <circle cx="200" cy="250" r="4"/>
    <circle cx="270" cy="130" r="4"/>
  </g>

  <!-- 15 hacker-zone tentacles (red), fanning lower-left -->
  <g stroke-width="1.25" fill="none" opacity="0.7">
    <path d="M 380 320 C 340 380, 260 440, 200 470" stroke="url(#hzAccent)"/>
    <path d="M 380 320 C 340 410, 240 470, 180 510" stroke="url(#hzAccent)"/>
    <path d="M 380 320 C 320 430, 220 500, 160 550" stroke="url(#hzAccent)"/>
    <path d="M 380 320 C 280 410, 180 460, 120 480" stroke="url(#hzAccent)"/>
    <path d="M 380 320 C 250 380, 150 410, 90 425" stroke="url(#hzAccent)"/>
    <path d="M 380 320 C 230 360, 110 360, 60 365" stroke="url(#hzAccent)"/>
    <path d="M 380 320 C 220 320, 90 300, 40 295" stroke="url(#hzAccent)"/>
    <path d="M 380 320 C 230 270, 110 250, 60 240" stroke="url(#hzAccent)"/>
    <path d="M 380 320 C 250 240, 140 200, 80 175" stroke="url(#hzAccent)"/>
    <path d="M 380 320 C 280 220, 180 165, 110 130" stroke="url(#hzAccent)"/>
    <path d="M 380 320 C 320 200, 230 130, 170 90"  stroke="url(#hzAccent)"/>
    <path d="M 380 320 C 350 195, 280 100, 230 60"  stroke="url(#hzAccent)"/>
    <path d="M 380 320 C 365 410, 320 510, 280 580" stroke="url(#hzAccent)"/>
    <path d="M 380 320 C 380 420, 410 540, 420 605" stroke="url(#hzAccent)"/>
    <path d="M 380 320 C 410 415, 470 530, 510 595" stroke="url(#hzAccent)"/>
  </g>

  <!-- HZ tentacle tips (red) -->
  <g fill="#ef4444" stroke="#0e1322" stroke-width="1.25">
    <circle cx="200" cy="470" r="4"/>
    <circle cx="180" cy="510" r="4"/>
    <circle cx="160" cy="550" r="4"/>
    <circle cx="120" cy="480" r="3.5"/>
    <circle cx="90"  cy="425" r="3.5"/>
    <circle cx="60"  cy="365" r="3.5"/>
    <circle cx="40"  cy="295" r="3.5"/>
    <circle cx="60"  cy="240" r="3.5"/>
    <circle cx="80"  cy="175" r="3.5"/>
    <circle cx="110" cy="130" r="3.5"/>
    <circle cx="170" cy="90"  r="3.5"/>
    <circle cx="230" cy="60"  r="3.5"/>
    <circle cx="280" cy="580" r="3.5"/>
    <circle cx="420" cy="605" r="3.5"/>
    <circle cx="510" cy="595" r="3.5"/>
  </g>

  <!-- ======= HEADLINE (right half) ======= -->
  <text x="700" y="170" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="22" font-weight="600" letter-spacing="6" fill="#9aa4bf">OCTOPUS AGENTS</text>

  <text x="700" y="270" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="120" font-weight="800" fill="#e8ecf6" letter-spacing="-3">V2.2</text>

  <text x="700" y="320" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="22" font-weight="500" fill="#9aa4bf">A 34-agent local-first mesh</text>

  <!-- Stat cards -->
  <g font-family="ui-monospace,Consolas,Menlo,monospace">
    <!-- Card 1 -->
    <rect x="700" y="360" width="138" height="84" rx="10" fill="#10162a" stroke="#1f2742" stroke-width="1"/>
    <text x="769" y="395" text-anchor="middle" font-size="38" font-weight="700" fill="#7c5cff">34</text>
    <text x="769" y="425" text-anchor="middle" font-size="11" letter-spacing="1.5" fill="#9aa4bf">AGENTS</text>

    <!-- Card 2 -->
    <rect x="850" y="360" width="138" height="84" rx="10" fill="#10162a" stroke="#1f2742" stroke-width="1"/>
    <text x="919" y="395" text-anchor="middle" font-size="38" font-weight="700" fill="#5b8cff">37</text>
    <text x="919" y="425" text-anchor="middle" font-size="11" letter-spacing="1.5" fill="#9aa4bf">MODELS</text>

    <!-- Card 3 -->
    <rect x="1000" y="360" width="138" height="84" rx="10" fill="#10162a" stroke="#1f2742" stroke-width="1"/>
    <text x="1069" y="395" text-anchor="middle" font-size="38" font-weight="700" fill="#7c5cff">101</text>
    <text x="1069" y="425" text-anchor="middle" font-size="11" letter-spacing="1.5" fill="#9aa4bf">SKILLS</text>

    <!-- Card 4 -->
    <rect x="700" y="460" width="138" height="84" rx="10" fill="#10162a" stroke="#1f2742" stroke-width="1"/>
    <text x="769" y="495" text-anchor="middle" font-size="38" font-weight="700" fill="#5b8cff">37</text>
    <text x="769" y="525" text-anchor="middle" font-size="11" letter-spacing="1.5" fill="#9aa4bf">MCP SERVERS</text>

    <!-- Card 5 -->
    <rect x="850" y="460" width="138" height="84" rx="10" fill="#10162a" stroke="#1f2742" stroke-width="1"/>
    <text x="919" y="495" text-anchor="middle" font-size="38" font-weight="700" fill="#7c5cff">42</text>
    <text x="919" y="525" text-anchor="middle" font-size="11" letter-spacing="1.5" fill="#9aa4bf">API ROUTES</text>

    <!-- Card 6 -->
    <rect x="1000" y="460" width="138" height="84" rx="10" fill="#10162a" stroke="#1f2742" stroke-width="1"/>
    <text x="1069" y="495" text-anchor="middle" font-size="38" font-weight="700" fill="#ef4444">2</text>
    <text x="1069" y="525" text-anchor="middle" font-size="11" letter-spacing="1.5" fill="#9aa4bf">ZONES</text>
  </g>

  <!-- Footer caption -->
  <text x="700" y="585" font-family="ui-monospace,Consolas,Menlo,monospace" font-size="12" letter-spacing="2" fill="#5b6480">LOCAL-FIRST · LM STUDIO · MCP · OBSIDIAN MEMORY · OPEN SOURCE</text>

  <!-- Mainline / HZ legend -->
  <g font-family="ui-monospace,Consolas,Menlo,monospace" font-size="11" letter-spacing="1">
    <circle cx="80" cy="615" r="4" fill="#7c5cff"/>
    <text  x="92" y="619" fill="#9aa4bf">MAINLINE — 19</text>
    <circle cx="240" cy="615" r="4" fill="#ef4444"/>
    <text  x="252" y="619" fill="#9aa4bf">HACKER ZONE — 15</text>
  </g>
</svg>
